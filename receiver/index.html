<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gym Timer Receiver</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            background-color: #40324B;
            color: white;
            font-family: 'monospace';
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }
        #clock {
            font-size: 15vw; /* Set to 15vw (~1/5 height/width) to prevent overflow */
            font-weight: 900;
            text-align: center;
            line-height: 1.2;
            margin: 0 10vw; /* Generous side padding for overscan */
        }
        #details {
            font-size: 4vw; 
            margin-top: 15px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.9;
        }
        #rounds {
            font-size: 3vw; 
            margin-top: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="clock">00:00:00</div>
    <div id="details">Ready to Start</div>
    <div id="rounds"></div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const clockElement = document.getElementById('clock');
        const detailsElement = document.getElementById('details');
        const roundsElement = document.getElementById('rounds');
        const NAMESPACE = 'urn:x-cast:com.example.gym_timer';

        function formatTime(date) {
            const h = String(date.getHours()).padStart(2, '0');
            const m = String(date.getMinutes()).padStart(2, '0');
            const s = String(date.getSeconds()).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateLiveClock() {
            clockElement.innerText = formatTime(new Date());
        }

        let clockInterval = setInterval(updateLiveClock, 1000);

        const sounds = {
            'beep.mp3': new Audio('https://raw.githubusercontent.com/bill538/gym_timer/agent-v1/assets/sounds/beep.mp3'),
            'start.mp3': new Audio('https://raw.githubusercontent.com/bill538/gym_timer/agent-v1/assets/sounds/start.mp3'),
            'end.mp3': new Audio('https://raw.githubusercontent.com/bill538/gym_timer/agent-v1/assets/sounds/end.mp3')
        };

        function playSound(name) {
            if (sounds[name]) {
                sounds[name].currentTime = 0;
                sounds[name].play().catch(e => console.error('Error playing sound:', e));
            }
        }

        context.addCustomMessageListener(NAMESPACE, (event) => {
            console.log('Received message:', event.data);
            let data;
            try {
                data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            } catch (e) {
                console.error('Error parsing message:', e);
                return;
            }
            
            if (data.type === 'workout') {
                // Stop any live clock updates
                if (clockInterval) {
                    clearInterval(clockInterval);
                    clockInterval = null;
                }
                
                document.body.style.backgroundColor = data.backgroundColor || '#40324B';
                
                // DISPLAY ONLY THE WORKOUT TIMER (mm:ss or seconds as passed)
                clockElement.innerText = data.time;
                detailsElement.innerText = data.state;

                if (data.totalRounds > 1) {
                    roundsElement.innerText = `Round ${data.round} / ${data.totalRounds}`;
                } else {
                    roundsElement.innerText = '';
                }

                if (data.sound) {
                    playSound(data.sound);
                }
            } else if (data.type === 'idle') {
                // Return to live clock
                document.body.style.backgroundColor = '#40324B';
                detailsElement.innerText = 'Ready to Start';
                roundsElement.innerText = '';
                
                // If the app sends a specific time, display it; otherwise use local clock
                if (data.time) {
                    if (clockInterval) {
                        clearInterval(clockInterval);
                        clockInterval = null;
                    }
                    clockElement.innerText = data.time;
                } else if (!clockInterval) {
                    updateLiveClock();
                    clockInterval = setInterval(updateLiveClock, 1000);
                }
            }
        });

        // Start receiver
        context.start();
    </script>
</body>
</html>
